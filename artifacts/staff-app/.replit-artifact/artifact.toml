kind = "web"
previewPath = "/"
title = "Discord Staff Application"
version = "1.0.0"
id = "artifacts/staff-app"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24314

[services.development]
run = "pnpm --filter @workspace/staff-app run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/staff-app", "run", "build" ]
publicDir = "artifacts/staff-app/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24314"
BASE_PATH = "/"
